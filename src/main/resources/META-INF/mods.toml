modLoader = "kotlinforforge"
loaderVersion = "[4,)"
license = "${mod_license}"

# This is a URL to e.g. your GitHub or CurseForge issues page.
# It will appear in any crash reports this mod is directly involved in.
issueTrackerURL="https://github.com/YiRanMushroom/GTMQoL"
# A list of mods - how many allowed here is determined by the individual mod loader

[[mods]]
    modId = "gtmqol"
    version = "${version}"
    displayName = "${mod_name}"
    displayURL = "${mod_url}"
    authors="${mod_author}"
    description = '''
This mod provides some QoL(Not really) machines and capabilities, as well as some gregification and recipe simplification, energy conversion etc to gregtech, and some of the addons, and other mods.
'''

    [[dependencies.gtmqol]]
        modId = "forge"
        mandatory = true
        versionRange = "[${forge_version},)"
        ordering = "NONE"
        side = "BOTH"
    [[dependencies.gtmqol]]
        modId = "minecraft"
        mandatory = true
        versionRange = "[${minecraft_version},)"
        ordering = "NONE"
        side = "BOTH"
    [[dependencies.gtmqol]]
        modId = "gtceu"
        mandatory = true
        versionRange = "[${gtceu_version},)"
        ordering = "AFTER"
        side = "BOTH"
    [[dependencies.gtmqol]]
        modId = "ae2"
        mandatory = true
        versionRange = "[${ae2_version},)"
        ordering = "AFTER"
        side = "BOTH"
